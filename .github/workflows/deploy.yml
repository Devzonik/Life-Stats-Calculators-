name: Deploy to Hostinger

on:
  push:
    branches:
      - main # or master, depending on your branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            cd ${{ secrets.HOSTINGER_PROJECT_PATH }}
            git pull origin main
            npm install --production
            npm run build
            # Restart the app (assuming PM2 is used, which is common on Hostinger)
            pm2 restart lifestats || pm2 start server.ts --name lifestats --interpreter tsx
